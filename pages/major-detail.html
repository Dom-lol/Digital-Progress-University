<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="icon" type="image/x-icon" href="../assets/img/favicon.ico">
    <title>Major Details - Digital Progress University</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@400;700&family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', 'Kantumruy Pro', sans-serif; }
        .bg-pattern { background-image: radial-gradient(#1e5f8a 0.5px, transparent 0.5px); background-size: 15px 15px; }
    </style>
</head>
<body class="bg-[#f9fafb]">

    <nav class="bg-[#1e5f8a] sticky top-0 z-50 w-full shadow-lg text-white">
        <div class="container mx-auto h-[65px] flex items-center justify-between px-6">
            <a href="index.html" class="flex items-center gap-3 group">
                <img src="../assets/img/favicon.ico" class="w-10 brightness-0 invert transition-transform group-hover:scale-110" alt="Logo">
                <span class="font-bold text-lg hidden md:block">DPU University</span>
            </a>
            <button onclick="history.back()" class="flex items-center gap-2 bg-white/10 px-5 py-2 rounded-xl hover:bg-yellow-400 hover:text-[#0a3d62] transition-all font-bold text-sm">
                <i class="fa-solid fa-arrow-left"></i> BACK
            </button>
        </div>
    </nav>

    <header class="bg-white border-b py-20 relative overflow-hidden bg-pattern">
        <div class="container mx-auto px-6 relative z-10">
            <nav class="flex text-[10px] text-gray-400 mb-6 uppercase font-black tracking-[0.2em]">
                <a href="index.html" class="hover:text-[#1e5f8a]">Home</a>
                <span class="mx-3 text-gray-300">/</span>
                <span id="faculty-breadcrumb" class="text-gray-400">Faculty</span>
                <span class="mx-3 text-gray-200">/</span>
                <span class="text-[#1e5f8a]">Major Detail</span>
            </nav>
            <h1 id="major-name" class="text-4xl md:text-6xl font-black text-[#0a3d62] mb-4 uppercase tracking-tighter italic">
                Loading...
            </h1>
            <div class="inline-block bg-yellow-400 px-4 py-1 rounded-lg">
                <p id="major-kh" class="text-lg md:text-xl text-[#0a3d62] font-bold">សូមរង់ចាំ...</p>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-6 py-16">
        <div class="flex flex-col lg:flex-row gap-16">
            
            <div class="lg:w-2/3 space-y-12">
                
                <div class="grid grid-cols-2 md:grid-cols-3 gap-6">
                    <div class="bg-white p-8 rounded-[32px] border border-gray-100 shadow-sm hover:shadow-md transition-all">
                        <div class="w-12 h-12 bg-blue-50 text-[#1e5f8a] rounded-2xl flex items-center justify-center mb-4 text-xl">
                            <i class="fa-solid fa-calendar-days"></i>
                        </div>
                        <p class="text-[10px] text-gray-400 uppercase font-black tracking-widest mb-1">Duration</p>
                        <p id="info-duration" class="text-[#0a3d62] font-black text-xl">--</p>
                    </div>
                    <div class="bg-white p-8 rounded-[32px] border border-gray-100 shadow-sm hover:shadow-md transition-all">
                        <div class="w-12 h-12 bg-blue-50 text-[#1e5f8a] rounded-2xl flex items-center justify-center mb-4 text-xl">
                            <i class="fa-solid fa-layer-group"></i>
                        </div>
                        <p class="text-[10px] text-gray-400 uppercase font-black tracking-widest mb-1">Total Credits</p>
                        <p id="info-credits" class="text-[#0a3d62] font-black text-xl">--</p>
                    </div>
                    <div class="bg-white p-8 rounded-[32px] border border-gray-100 shadow-sm hover:shadow-md transition-all col-span-2 md:col-span-1">
                        <div class="w-12 h-12 bg-blue-50 text-[#1e5f8a] rounded-2xl flex items-center justify-center mb-4 text-xl">
                            <i class="fa-solid fa-award"></i>
                        </div>
                        <p class="text-[10px] text-gray-400 uppercase font-black tracking-widest mb-1">Degree Type</p>
                        <p id="info-degree" class="text-[#0a3d62] font-black text-xl">Bachelor</p>
                    </div>
                </div>

                <section>
                    <h4 class="text-2xl font-black text-[#0a3d62] mb-8 flex items-center gap-4 italic uppercase">
                        <span class="w-2.5 h-10 bg-[#1e5f8a] rounded-full"></span>
                        Curriculum (មុខវិជ្ជាសិក្សាគោល)
                    </h4>
                    <div id="subjects-container" class="grid grid-cols-1 md:grid-cols-1 gap-4">
                        </div>
                </section>
            </div>

            <div class="lg:w-1/3 space-y-8">
                <div class="bg-[#0a3d62] p-10 rounded-[45px] text-white relative overflow-hidden group shadow-2xl">
                    <div class="relative z-10">
                        <h4 class="text-2xl font-black mb-4 uppercase italic">Start Your<br><span class="text-yellow-400">Journey</span></h4>
                        <p class="text-blue-100/70 mb-10 text-sm leading-relaxed">ក្លាយជានិស្សិតរបស់ DPU ដើម្បីទទួលបានបទពិសោធន៍សិក្សាបែបឌីជីថលពិតៗ។</p>
                        <a href="#" class="block w-full bg-white text-[#0a3d62] text-center py-4 rounded-2xl font-black hover:bg-yellow-400 transition-all uppercase tracking-widest text-sm">Register Now</a>
                    </div>
                    <div class="absolute -right-10 -bottom-10 w-40 h-40 bg-white/5 rounded-full blur-3xl group-hover:scale-150 transition-transform"></div>
                </div>

                <div class="bg-white p-8 rounded-[40px] border border-gray-100 shadow-sm">
                    <h4 class="font-black text-gray-900 mb-8 uppercase italic text-sm tracking-widest border-b pb-4">Contact Info</h4>
                    <div id="major-contact" class="space-y-6">
                        </div>
                </div>
            </div>
        </div>
    </main>

    <script src="../assets/js/faculty-data.js"></script>
    <script src="../assets/js/major-detail.js"></script>
</body>
</html>
